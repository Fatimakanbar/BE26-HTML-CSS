        <h1 style="padding-left: 30px;">Log in </h1>



        <main> 
    <form action="https://postman-echo.com/get" method="get" class="form">

        <fieldset>
            <legend>Login</legend>

    <div class="form-grid">
        
        <div class="left">
        <label for="fname">First Name: *</label>
        <input type="text" id="fname" name="fname" required placeholder="Your first name" style="font-style:oblique;"><br><br>

        <label for="lname">Last Name: *</label>
        <input type="text" id="lname" name="lname" required placeholder="Your last name" style="font-style:oblique;"><br><br>

        <label for="mobile">Mobile Number</label>
        <input type="tel" id="mobile" name="mobile" placeholder="+46 7">
        </div>

        <div class="right"><br>
        <label>Email   *</label>
        <input type="email" required placeholder="Enter your email" style="font-style:oblique;"><br><br>    <br> 

        
        <label>Password   *</label>
        <input type="password" required placeholder="Enter your password" style="font-style:oblique;"><br><br>
    
    <input type="submit" value="login" class="login-btn">
        </div>

    </div>



</fieldset>
    </form> 

</main>
