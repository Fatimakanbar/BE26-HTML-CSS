    <h1 style="padding-left: 30px;">Contact Us </h1>
<div class="kontakt">
<fieldset>
            <legend>Contact Us</legend>


        <form action="#" method="post">

        <label for="name">Name: *</label><br>
        <input type="text" id="name" name="username" placeholder="Enter your name" required><br><br>

        <label for="email">Email:  *</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

        <label for="message">Message:  *</label><br>
        <textarea id="message" name="message" rows="5" cols="25" required placeholder="Write your message here"></textarea><br><br>

        <button type="submit">Send</button>

    </form></fieldset>
</div>
